{% extends "base.html" %}
{% block title %}PHR Vault{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-sm p-4">
                <h1 class="mb-3">Welcome to PHR Vault</h1>
                <p class="lead mb-4">Securely store, manage, and share your medical records online.</p>

                {% if not current_user.is_authenticated %}
                    <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg me-2">Login</a>
                    <a href="{{ url_for('register') }}" class="btn btn-success btn-lg">Create Account</a>
                {% else %}
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">Go to Dashboard</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
